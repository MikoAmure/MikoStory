<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Chapter - MikoStory</title>

<link rel="stylesheet" href="style.css">

<style>

.container{
    max-width:900px;
    margin:40px auto;
    background:#1e293b;
    padding:30px;
    border-radius:15px;
}

.container h1{
    margin-bottom:25px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
}

input[type=file]{
    background:white;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:8px;
    background:#f59e0b;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#d97706;
}

</style>

</head>

<body>

<header>

<div class="logo">MikoStory Admin</div>

<nav>

<a href="admin.html">Dashboard</a>
<a href="upload-komik.html">Upload Komik</a>
<a href="upload-chapter.html">Upload Chapter</a>

</nav>

</header>

<div class="container">

<h1>Upload Chapter Baru</h1>

<form>

<div class="form-group">
<label>Pilih Komik</label>

<select>
<option>Solo Leveling</option>
<option>One Piece</option>
<option>Blue Lock</option>
</select>

</div>

<div class="form-group">
<label>Nomor Chapter</label>
<input type="number" placeholder="Contoh: 201">
</div>

<div class="form-group">
<label>Judul Chapter</label>
<input type="text" placeholder="Masukkan judul chapter">
</div>

<div class="form-group">
<label>Upload Semua Gambar Chapter</label>
<input type="file" multiple>
</div>

<div class="form-group">
<label>Catatan (Opsional)</label>
<textarea placeholder="Contoh: Chapter spesial"></textarea>
</div>

<button type="submit">
Upload Chapter
</button>

</form>

</div>

</body>
</html>
