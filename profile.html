<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil - MikoStory</title>

<link rel="stylesheet" href="style.css">

<style>

.profile-container{
    max-width:900px;
    margin:40px auto;
    padding:20px;
}

.profile-card{
    background:#1e293b;
    border-radius:15px;
    padding:30px;
    text-align:center;
}

.profile-card img{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #f59e0b;
}

.profile-card h2{
    margin-top:20px;
}

.profile-card p{
    color:#cbd5e1;
    margin:8px 0;
}

.stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    margin-top:30px;
}

.stat-box{
    background:#0f172a;
    padding:20px;
    border-radius:10px;
}

.stat-box h3{
    color:#f59e0b;
    font-size:28px;
}

.button-group{
    margin-top:30px;
}

.button-group a{
    display:inline-block;
    padding:12px 25px;
    margin:5px;
    text-decoration:none;
    border-radius:8px;
    color:white;
}

.edit-btn{
    background:#f59e0b;
}

.logout-btn{
    background:#dc2626;
}

@media(max-width:768px){

.stats{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<header>

<div class="logo">MikoStory</div>

<nav>

<a href="index.html">Beranda</a>

<a href="komik.html">Komik</a>

<a href="bookmark.html">Bookmark</a>

<a href="profile.html">Profil</a>

</nav>

</header>

<div class="profile-container">

<div class="profile-card">

<img src="https://i.pravatar.cc/300" alt="Foto Profil">

<h2>Miko Amora</h2>

<p>miko@email.com</p>

<div class="stats">

<div class="stat-box">
<h3>18</h3>
<p>Bookmark</p>
</div>

<div class="stat-box">
<h3>76</h3>
<p>Riwayat Baca</p>
</div>

<div class="stat-box">
<h3>12</h3>
<p>Komentar</p>
</div>

</div>

<div class="button-group">

<a href="#" class="edit-btn">
Edit Profil
</a>

<a href="login.html" class="logout-btn">
Logout
</a>

</div>

</div>

</div>

</body>
</html>
