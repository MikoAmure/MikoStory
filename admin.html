<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - MikoStory</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    display:flex;
    background:#0f172a;
}

.sidebar{
    width:250px;
    min-height:100vh;
    background:#111827;
    padding:20px;
}

.sidebar h2{
    color:#f59e0b;
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:12px;
    margin-bottom:10px;
    border-radius:8px;
}

.sidebar a:hover{
    background:#1e293b;
}

.main{
    flex:1;
    padding:30px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:#1e293b;
    padding:25px;
    border-radius:12px;
    text-align:center;
}

.card h3{
    color:#f59e0b;
    font-size:35px;
}

table{
    width:100%;
    margin-top:40px;
    border-collapse:collapse;
}

table th,
table td{
    border:1px solid #374151;
    padding:12px;
    text-align:center;
}

table th{
    background:#111827;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>MikoStory</h2>

<a href="admin.html">Dashboard</a>
<a href="upload-komik.html">Upload Komik</a>
<a href="upload-chapter.html">Upload Chapter</a>
<a href="users.html">Pengguna</a>
<a href="index.html">Kembali Website</a>

</div>

<div class="main">

<h1>Dashboard Admin</h1>

<br>

<div class="cards">

<div class="card">
<h3>128</h3>
<p>Total Komik</p>
</div>

<div class="card">
<h3>2.453</h3>
<p>Total Chapter</p>
</div>

<div class="card">
<h3>5.214</h3>
<p>Total User</p>
</div>

<div class="card">
<h3>18.250</h3>
<p>Total Pengunjung</p>
</div>

</div>

<table>

<tr>
<th>Komik</th>
<th>Status</th>
<th>Chapter</th>
</tr>

<tr>
<td>Solo Leveling</td>
<td>Completed</td>
<td>201</td>
</tr>

<tr>
<td>One Piece</td>
<td>Ongoing</td>
<td>1155</td>
</tr>

<tr>
<td>Blue Lock</td>
<td>Ongoing</td>
<td>312</td>
</tr>

</table>

</div>

</body>
</html>
