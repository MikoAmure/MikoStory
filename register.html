<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daftar Akun - MikoStory</title>

<link rel="stylesheet" href="style.css">

<style>

.register-container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#0f172a;
}

.register-box{
    width:420px;
    background:#1e293b;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,.4);
}

.register-box h1{
    text-align:center;
    margin-bottom:25px;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
}

.input-group input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#f59e0b;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#d97706;
}

.login-link{
    text-align:center;
    margin-top:20px;
}

.login-link a{
    color:#f59e0b;
    text-decoration:none;
}

</style>

</head>

<body>

<div class="register-container">

<div class="register-box">

<h1>Daftar Akun</h1>

<div class="input-group">
<label>Nama Pengguna</label>
<input type="text" placeholder="Masukkan nama">
</div>

<div class="input-group">
<label>Email</label>
<input type="email" placeholder="Masukkan email">
</div>

<div class="input-group">
<label>Password</label>
<input type="password" placeholder="Masukkan password">
</div>

<div class="input-group">
<label>Konfirmasi Password</label>
<input type="password" placeholder="Ulangi password">
</div>

<button>Daftar</button>

<div class="login-link">
Sudah punya akun?
<a href="login.html">Login</a>
</div>

</div>

</div>

</body>
</html>
