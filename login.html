<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - MikoStory</title>

<link rel="stylesheet" href="style.css">

<style>

.login-container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#0f172a;
}

.login-box{
    width:380px;
    background:#1e293b;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,.4);
}

.login-box h1{
    text-align:center;
    margin-bottom:25px;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
}

.input-group input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#f59e0b;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#d97706;
}

.register{
    text-align:center;
    margin-top:20px;
}

.register a{
    color:#f59e0b;
    text-decoration:none;
}

</style>

</head>

<body>

<div class="login-container">

<div class="login-box">

<h1>Login</h1>

<div class="input-group">
<label>Email</label>
<input type="email" placeholder="Masukkan email">
</div>

<div class="input-group">
<label>Password</label>
<input type="password" placeholder="Masukkan password">
</div>

<button>Masuk</button>

<div class="register">
Belum punya akun?
<a href="register.html">Daftar</a>
</div>

</div>

</div>

</body>
</html>
