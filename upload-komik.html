<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upload Komik - MikoStory</title>

<link rel="stylesheet" href="style.css">

<style>

.container{
    max-width:900px;
    margin:40px auto;
    background:#1e293b;
    padding:30px;
    border-radius:15px;
}

.container h1{
    margin-bottom:30px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
}

textarea{
    min-height:180px;
    resize:vertical;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:8px;
    background:#f59e0b;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#d97706;
}

</style>

</head>

<body>

<header>

<div class="logo">MikoStory Admin</div>

<nav>

<a href="admin.html">Dashboard</a>

<a href="upload-komik.html">Upload Komik</a>

<a href="upload-chapter.html">Upload Chapter</a>

</nav>

</header>

<div class="container">

<h1>Tambah Komik Baru</h1>

<form>

<div class="form-group">
<label>Judul Komik</label>
<input type="text" placeholder="Masukkan judul komik">
</div>

<div class="form-group">
<label>Cover Komik</label>
<input type="file">
</div>

<div class="form-group">
<label>Genre</label>
<select>
<option>Action</option>
<option>Adventure</option>
<option>Fantasy</option>
<option>Romance</option>
<option>Comedy</option>
<option>Drama</option>
<option>Horror</option>
<option>Isekai</option>
</select>
</div>

<div class="form-group">
<label>Author</label>
<input type="text">
</div>

<div class="form-group">
<label>Status</label>
<select>
<option>Ongoing</option>
<option>Completed</option>
<option>Hiatus</option>
</select>
</div>

<div class="form-group">
<label>Sinopsis</label>
<textarea></textarea>
</div>

<button type="submit">
Simpan Komik
</button>

</form>

</div>

</body>
</html>
