<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookmark - MikoStory</title>

<link rel="stylesheet" href="style.css">

<style>

.container{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
}

.container h1{
    margin-bottom:25px;
}

.bookmark-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:20px;
}

.bookmark-card{
    background:#1e293b;
    border-radius:12px;
    overflow:hidden;
    transition:.3s;
}

.bookmark-card:hover{
    transform:translateY(-5px);
}

.bookmark-card img{
    width:100%;
    height:280px;
    object-fit:cover;
}

.bookmark-card .content{
    padding:15px;
}

.bookmark-card h3{
    margin-bottom:10px;
}

.bookmark-card p{
    color:#cbd5e1;
    margin-bottom:15px;
}

.button-group{
    display:flex;
    gap:10px;
}

.button-group a{
    flex:1;
    text-align:center;
    padding:10px;
    border-radius:8px;
    text-decoration:none;
    color:white;
}

.read-btn{
    background:#f59e0b;
}

.delete-btn{
    background:#dc2626;
}

</style>

</head>

<header
