<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar Komik - MikoStory</title>

<link rel="stylesheet" href="style.css">

<style>
.page{
    padding:50px 8%;
}

.page h1{
    margin-bottom:25px;
}

.search-box{
    width:100%;
    max-width:500px;
    padding:14px;
    border:none;
    border-radius:10px;
    margin-bottom:30px;
    font-size:16px;
}
</style>

</head>

<body>

<header>

<div class="logo">
MikoStory
</div>

<nav>
<a href="index.html">Beranda</a>
<a href="komik.html">Komik</a>
<a href="#">Genre</a>
<a href="#">Bookmark</a>
</nav>

</header>

<div class="page">

<h1>Daftar Komik</h1>

<input
id="search"
class="search-box"
type="text"
placeholder="Cari judul komik..."
>

<div class="comic-list" id="comicList">

</div>

</div>

<script>

const komik=[

{
judul:"Solo Leveling",
chapter:"Chapter 201",
gambar:"https://picsum.photos/300/420?1"
},

{
judul:"One Piece",
chapter:"Chapter 1155",
gambar:"https://picsum.photos/300/420?2"
},

{
judul:"Blue Lock",
chapter:"Chapter 312",
gambar:"https://picsum.photos/300/420?3"
},

{
judul:"Chainsaw Man",
chapter:"Chapter 210",
gambar:"https://picsum.photos/300/420?4"
},

{
judul:"Kaiju No.8",
chapter:"Chapter 128",
gambar:"https://picsum.photos/300/420?5"
},

{
judul:"Dandadan",
chapter:"Chapter 195",
gambar:"https://picsum.photos/300/420?6"
}

];

const list=document.getElementById("comicList");

function tampil(data){

list.innerHTML="";

data.forEach(item=>{

list.innerHTML+=`
<div class="card">
<img src="${item.gambar}">
<h3>${item.judul}</h3>
<p>${item.chapter}</p>
</div>
`;

});

}

tampil(komik);

document.getElementById("search").addEventListener("keyup",(e)=>{

const hasil=komik.filter(item=>

item.judul.toLowerCase().includes(e.target.value.toLowerCase())

);

tampil(hasil);

});

</script>

</body>
</html>
